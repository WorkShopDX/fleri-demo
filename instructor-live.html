<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>配信（講師） | Fleri</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/tailwind-config.js"></script>
  <style>body{font-family:"Noto Sans JP",sans-serif}.font-heading{font-family:"Noto Sans JP",sans-serif}</style>
</head>
<body class="font-sans bg-[#2A2622] text-white antialiased">
  <div class="flex min-h-screen flex-col">
    <header class="flex items-center justify-between px-5 py-3">
      <div class="flex items-center gap-3">
        <span class="font-heading text-xl font-bold text-white">Fleri</span>
        <span class="inline-flex items-center gap-1.5 rounded-full bg-red-500/90 px-2.5 py-0.5 text-xs font-medium"><span class="h-1.5 w-1.5 rounded-full bg-white"></span>配信中</span>
        <span class="hidden text-sm text-white/70 sm:inline">季節の花で作る、小さなスワッグ</span>
      </div>
      <div class="flex items-center gap-4 text-sm text-white/70">
        <span class="inline-flex items-center gap-1.5"><svg fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" class="h-4 w-4"><path d="M16 19a4 4 0 0 0-8 0"/><circle cx="12" cy="8" r="3.5"/></svg>7名 参加中</span>
        <span>38:24</span>
      </div>
    </header>

    <div class="flex flex-1 flex-col lg:flex-row">
      <main class="flex-1 p-3">
        <!-- 自分（先生）の映像 -->
        <div class="relative h-[42vh] overflow-hidden rounded-3xl lg:h-[58vh]">
          <img src="images/ws-flower.png" alt="あなたの配信映像" class="h-full w-full object-cover" />
          <div class="absolute inset-x-0 bottom-0 bg-gradient-to-t from-black/60 to-transparent p-4">
            <span class="rounded-full bg-black/50 px-3 py-1 text-sm">あなた（みどり先生）</span>
          </div>
        </div>

        <!-- 参加者（ログイン済みはサムネ／未ログインは頭文字。カメラは既定オフ） -->
        <div class="mt-4 flex items-center gap-3">
          <div class="flex -space-x-2">
            <img src="images/ws-flower.png" alt="あおいさん" class="h-9 w-9 rounded-full border-2 border-[#2A2622] object-cover" />
            <span class="flex h-9 w-9 items-center justify-center rounded-full border-2 border-[#2A2622] bg-secondary/40 text-xs font-bold text-white">ま</span>
            <img src="images/ws-craft.png" alt="ゆうこさん" class="h-9 w-9 rounded-full border-2 border-[#2A2622] object-cover" />
            <span class="flex h-9 w-9 items-center justify-center rounded-full border-2 border-[#2A2622] bg-accent/40 text-xs font-bold text-white">け</span>
            <span class="flex h-9 w-9 items-center justify-center rounded-full border-2 border-[#2A2622] bg-secondary/40 text-xs font-bold text-white">な</span>
            <span class="flex h-9 w-9 items-center justify-center rounded-full border-2 border-[#2A2622] bg-white/15 text-xs font-medium text-white/80">+2</span>
          </div>
          <span class="text-sm text-white/70">7名 参加中</span>
        </div>

        <!-- 参加者から届いた手元の写真（あなたにだけ表示） -->
        <div class="mt-3 flex items-center gap-3 rounded-2xl border border-white/15 bg-white/5 p-3">
          <img src="images/ws-craft.png" alt="花山さくらさんの手元の写真" class="h-14 w-14 shrink-0 rounded-xl object-cover" />
          <div class="min-w-0 flex-1">
            <p class="text-sm"><span class="font-medium">花山さくらさん</span>が手元の写真を送りました</p>
            <p class="text-xs text-white/55">あなたにだけ表示されています</p>
          </div>
          <button id="introBtn" onclick="toggleIntro()" class="shrink-0 rounded-full bg-primary px-3 py-2 text-xs font-medium text-primary-foreground transition hover:scale-[1.02]">みんなにも紹介</button>
        </div>

        <!-- コントロール -->
        <div class="mt-4 flex flex-wrap items-center justify-center gap-3">
          <button class="flex h-12 w-12 items-center justify-center rounded-full bg-white/10 transition hover:bg-white/20" aria-label="マイク"><svg fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" class="h-6 w-6"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M6 11a6 6 0 0 0 12 0M12 17v4"/></svg></button>
          <button class="flex h-12 w-12 items-center justify-center rounded-full bg-white/10 transition hover:bg-white/20" aria-label="カメラ"><svg fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" class="h-6 w-6"><rect x="3" y="6" width="13" height="12" rx="2"/><path d="M16 10l5-3v10l-5-3"/></svg></button>
          <button class="flex h-12 w-12 items-center justify-center rounded-full bg-white/10 transition hover:bg-white/20" aria-label="画面共有"><svg fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" class="h-6 w-6"><rect x="3" y="5" width="18" height="12" rx="2"/><path d="M9 21h6M12 17v4"/></svg></button>
          <button onclick="document.getElementById('endmodal').classList.remove('hidden')" class="rounded-full bg-red-500 px-5 py-3 text-sm font-medium transition hover:bg-red-600">配信を終了</button>
        </div>
      </main>

      <!-- チャット -->
      <aside class="flex w-full flex-col border-t border-white/10 lg:w-80 lg:border-l lg:border-t-0">
        <div class="px-4 py-3 text-sm font-medium text-white/80">コメント</div>
        <div class="flex-1 space-y-3 overflow-y-auto px-4 pb-4 text-sm">
          <p><span class="text-secondary">あおい：</span><span class="text-white/80">きれいな色ですね！</span></p>
          <p><span class="text-secondary">まり：</span><span class="text-white/80">結び方、もう一度見せてください〜</span></p>
          <p><span class="text-secondary">ゆうこ：</span><span class="text-white/80">娘も楽しんでます！</span></p>
        </div>
        <div class="flex items-center gap-2 border-t border-white/10 p-3">
          <input type="text" placeholder="コメントを送る" class="flex-1 rounded-full bg-white/10 px-4 py-2.5 text-sm text-white placeholder-white/40 outline-none" />
          <button class="flex h-10 w-10 items-center justify-center rounded-full bg-primary"><svg fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" class="h-5 w-5"><path d="M4 12h15M13 6l6 6-6 6"/></svg></button>
        </div>
      </aside>
    </div>
  </div>

  <!-- 終了確認 -->
  <div id="endmodal" class="fixed inset-0 z-50 hidden bg-black/60 p-5">
    <div class="mx-auto mt-[18vh] max-w-sm rounded-3xl bg-background p-7 text-foreground">
      <h2 class="font-heading text-xl font-bold">配信を終了しますか？</h2>
      <p class="mt-2 text-sm text-muted-foreground">終了すると、参加者にアンケート（フォローのお願い）が表示されます。</p>
      <div class="mt-6 flex gap-3">
        <button onclick="document.getElementById('endmodal').classList.add('hidden')" class="flex-1 rounded-full border border-border px-5 py-3 text-sm font-medium text-foreground hover:bg-muted">つづける</button>
        <a href="instructor-dashboard.html" class="flex-1 rounded-full bg-primary px-5 py-3 text-center text-sm font-medium text-primary-foreground">終了する</a>
      </div>
    </div>
  </div>
  <script src="assets/fleri.js"></script>
  <script>
    // 「みんなにも紹介」を押すと参加者本人に同意確認を送る → 本人OKで全員に表示
    function updateIntroBtn() {
      const b = document.getElementById("introBtn");
      if (!b) return;
      const v = localStorage.getItem("fleri_spotlight");
      b.textContent = v === "on" ? "紹介を終了" : (v === "pending" ? "承認待ち…" : "みんなにも紹介");
    }
    function toggleIntro() {
      const v = localStorage.getItem("fleri_spotlight");
      localStorage.setItem("fleri_spotlight", (v === "on" || v === "pending") ? "off" : "pending");
      updateIntroBtn();
    }
    window.addEventListener("storage", (e) => { if (e.key === "fleri_spotlight") updateIntroBtn(); });
    updateIntroBtn();
  </script>
</body>
</html>
