<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>講師登録 | Fleri</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/fleri.css" />
  <style>
    .form{max-width:680px;margin:0 auto;padding:0 20px}
    .stepper{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;margin-top:20px;flex-wrap:wrap}
    .stp{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:999px;background:var(--muted-bg,#F0EEE8);color:var(--muted)}
    .stp.on{background:var(--primary);color:#fff}
    .stp .n{width:18px;height:18px;border-radius:999px;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:11px}
    .stp.off .n{background:rgba(0,0,0,.08)}
    .line{flex:1;height:1px;background:var(--border);min-width:14px}
    .catgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:8px}
    @media(min-width:600px){.catgrid{grid-template-columns:repeat(3,1fr)}}
    .catbtn{border:1px solid var(--border);background:var(--card);border-radius:12px;padding:12px;font-size:14px;color:var(--ink);cursor:pointer;font-family:var(--body)}
    .catbtn.is-on{border-color:var(--primary);background:var(--soft);color:var(--deep);font-weight:600}
  </style>
</head>
<body>
<div class="app">

  <header class="topbar">
    <a href="index.html" class="brand">Fleri</a>
    <nav class="dnav"><a href="workshops.html">さがす</a><a href="workshops.html">カテゴリ</a><a href="for-instructors.html">教える人へ</a></nav>
    <div class="ta">
      <a href="workshops.html" class="icbtn" aria-label="さがす"><svg fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg></a>
      <a href="#" class="acct-login pc-only">ログイン</a>
    </div>
  </header>

  <div class="form" style="padding-top:24px">
    <p style="font-size:14px;font-weight:600;color:var(--deep)">教える人になる</p>
    <h1 class="h1" style="margin-top:6px">アカウントを作成しましょう</h1>
    <p class="sub">3ステップで完了します。プランの選択は不要・まずは都度払いではじめられます。</p>

    <div class="stepper">
      <span class="stp on"><span class="n">1</span>アカウント</span><span class="line"></span>
      <span class="stp off"><span class="n">2</span>カテゴリ</span><span class="line"></span>
      <span class="stp off"><span class="n">3</span>プロフィール</span>
    </div>

    <form style="margin-top:24px" onsubmit="event.preventDefault(); window.location.href='instructor-dashboard.html';">
      <div class="panel">
        <h2 style="font-family:var(--head);font-weight:700;font-size:18px">1. アカウント</h2>
        <div class="field"><label for="su-name">お名前（活動名でも可）</label><input id="su-name" class="input" type="text" placeholder="例：みどり" /></div>
        <div class="field"><label for="su-email">メールアドレス</label><input id="su-email" class="input" type="email" placeholder="you@example.com" /></div>
        <div class="field"><label for="su-pass">パスワード</label><input id="su-pass" class="input" type="password" placeholder="8文字以上" /></div>
      </div>

      <div class="panel" style="margin-top:18px">
        <h2 style="font-family:var(--head);font-weight:700;font-size:18px">2. カテゴリ</h2>
        <p class="sub" style="margin-top:4px">あなたが教える分野を選んでください（メイン1つ・サブ1つまで／最大2つ）。</p>
        <div class="catgrid" id="catgrid">
          <button type="button" class="catbtn">美容・スキンケア</button>
          <button type="button" class="catbtn">手芸・クラフト</button>
          <button type="button" class="catbtn">フラワー</button>
          <button type="button" class="catbtn">料理・食</button>
          <button type="button" class="catbtn">アロマ・キャンドル</button>
          <button type="button" class="catbtn">暮らしの知恵</button>
        </div>
        <p class="sub" id="cathint" style="margin-top:10px;font-size:12px">選択中：0／2</p>
      </div>

      <div class="panel" style="margin-top:18px">
        <h2 style="font-family:var(--head);font-weight:700;font-size:18px">3. プロフィール</h2>
        <div class="field"><label for="su-tag">ひとことメッセージ</label><input id="su-tag" class="input" type="text" placeholder="例：季節の花で、暮らしに彩りを。" /></div>
        <div class="field"><label for="su-bio">自己紹介</label><textarea id="su-bio" class="input" rows="3" placeholder="これまでの活動や、教えるときに大切にしていることを書いてみましょう。"></textarea></div>
      </div>

      <button type="submit" class="btn btn-primary btn-block" style="margin-top:20px">登録してはじめる
        <svg fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M4 12h15M13 6l6 6-6 6"/></svg></button>
      <p style="text-align:center;font-size:12px;color:var(--muted);margin-top:10px">登録は無料。最初の成立開催まで利用料はかかりません。</p>
    </form>
  </div>

  <div class="spacer"></div>

  <nav class="tabbar">
    <a class="tab" href="index.html"><svg fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M4 11l8-6 8 6"/><path d="M6 10v9h12v-9"/></svg>ホーム</a>
    <a class="tab" href="workshops.html"><svg fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>さがす</a>
    <a class="tab" href="instructor-workshop-new.html"><span class="plus"><svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></span></a>
    <a class="tab" href="#"><svg fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M18 9a6 6 0 0 0-12 0c0 7-3 8-3 8h18s-3-1-3-8"/><path d="M13.5 21a2 2 0 0 1-3 0"/></svg>通知</a>
    <a class="tab on" href="instructor-dashboard.html"><svg fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20a8 8 0 0 1 16 0"/></svg>マイ</a>
  </nav>

</div>
<script>
  const hint=document.getElementById("cathint");
  document.querySelectorAll("#catgrid .catbtn").forEach(b=>b.addEventListener("click",()=>{
    const sel=document.querySelectorAll("#catgrid .catbtn.is-on");
    if(!b.classList.contains("is-on") && sel.length>=2) return;
    b.classList.toggle("is-on");
    hint.textContent="選択中："+document.querySelectorAll("#catgrid .catbtn.is-on").length+"／2";
  }));
</script>
</body>
</html>
