<!doctype html>
<html lang="ja" class="scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ワークショップを作る | Fleri</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/tailwind-config.js"></script>
  <style>body{font-family:"Noto Sans JP",sans-serif}.font-heading{font-family:"Noto Sans JP",sans-serif}</style>
</head>
<body class="font-sans bg-background text-foreground antialiased">
  <div class="min-h-screen">
    <div id="site-header"></div>

    <main class="pt-16">
      <div class="mx-auto max-w-2xl px-5 py-8">
        <a href="instructor-dashboard.html" class="inline-flex items-center gap-1.5 text-sm text-muted-foreground hover:text-foreground">
          <svg fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" class="h-4 w-4"><path d="M15 6l-6 6 6 6"/></svg>
          ダッシュボードにもどる
        </a>
        <h1 class="mt-4 font-heading text-2xl font-bold text-foreground md:text-3xl">ワークショップを作る</h1>
        <p class="mt-2 text-sm text-muted-foreground">入力はあとから変更できます。気軽に下書きしてみましょう。</p>

        <form class="mt-8 space-y-5" onsubmit="event.preventDefault(); window.location.href='instructor-dashboard.html';">
          <!-- 基本情報 -->
          <section class="rounded-3xl border border-border bg-card p-6">
            <h2 class="font-heading text-lg font-bold text-foreground">基本情報</h2>
            <div class="mt-4 space-y-4">
              <div>
                <label for="ws-title" class="text-sm font-medium text-foreground">タイトル</label>
                <input id="ws-title" type="text" placeholder="例：季節の花で作る、小さなスワッグ" class="mt-1.5 w-full rounded-2xl border border-border bg-background px-4 py-3 text-base outline-none focus:border-primary" />
              </div>
              <div>
                <label for="ws-desc" class="text-sm font-medium text-foreground">紹介文</label>
                <textarea id="ws-desc" rows="3" placeholder="どんな時間になるか、初めての方にも伝わるように書いてみましょう。" class="mt-1.5 w-full rounded-2xl border border-border bg-background px-4 py-3 text-base outline-none focus:border-primary"></textarea>
              </div>
              <div>
                <label class="text-sm font-medium text-foreground">カテゴリ（最大2つ）</label>
                <div class="mt-2 grid grid-cols-2 gap-3 sm:grid-cols-3" id="catgrid">
                  <button type="button" class="cat rounded-2xl border border-border bg-background px-3 py-2.5 text-sm text-foreground transition-colors hover:border-primary">美容・スキンケア</button>
                  <button type="button" class="cat rounded-2xl border border-border bg-background px-3 py-2.5 text-sm text-foreground transition-colors hover:border-primary">手芸・クラフト</button>
                  <button type="button" class="cat rounded-2xl border border-border bg-background px-3 py-2.5 text-sm text-foreground transition-colors hover:border-primary">フラワー</button>
                  <button type="button" class="cat rounded-2xl border border-border bg-background px-3 py-2.5 text-sm text-foreground transition-colors hover:border-primary">料理・食</button>
                  <button type="button" class="cat rounded-2xl border border-border bg-background px-3 py-2.5 text-sm text-foreground transition-colors hover:border-primary">アロマ・キャンドル</button>
                  <button type="button" class="cat rounded-2xl border border-border bg-background px-3 py-2.5 text-sm text-foreground transition-colors hover:border-primary">暮らしの知恵</button>
                </div>
              </div>
            </div>
          </section>

          <!-- 日時・定員 -->
          <section class="rounded-3xl border border-border bg-card p-6">
            <h2 class="font-heading text-lg font-bold text-foreground">日時・定員</h2>
            <div class="mt-4 grid grid-cols-1 gap-4 sm:grid-cols-2">
              <div>
                <label for="ws-date" class="text-sm font-medium text-foreground">開催日</label>
                <input id="ws-date" type="date" value="2026-06-29" class="mt-1.5 w-full rounded-2xl border border-border bg-background px-4 py-3 text-base outline-none focus:border-primary" />
              </div>
              <div>
                <label for="ws-time" class="text-sm font-medium text-foreground">開始時刻</label>
                <input id="ws-time" type="time" value="14:00" class="mt-1.5 w-full rounded-2xl border border-border bg-background px-4 py-3 text-base outline-none focus:border-primary" />
              </div>
              <div>
                <label for="ws-duration" class="text-sm font-medium text-foreground">配信時間</label>
                <select id="ws-duration" class="mt-1.5 w-full rounded-2xl border border-border bg-background px-4 py-3 text-base outline-none focus:border-primary">
                  <option>60分</option><option selected>90分</option>
                </select>
                <p class="mt-1.5 text-xs text-muted-foreground">1回の配信は90分までです。</p>
              </div>
              <div>
                <label for="ws-capacity" class="text-sm font-medium text-foreground">定員</label>
                <select id="ws-capacity" class="mt-1.5 w-full rounded-2xl border border-border bg-background px-4 py-3 text-base outline-none focus:border-primary">
                  <option>5名</option><option>8名</option><option selected>10名</option>
                </select>
                <p class="mt-1.5 text-xs text-muted-foreground">定員は10名までです。</p>
              </div>
            </div>
          </section>

          <!-- 参加費 -->
          <section class="rounded-3xl border border-border bg-card p-6">
            <h2 class="font-heading text-lg font-bold text-foreground">参加費</h2>
            <div class="mt-4">
              <div class="flex items-center gap-2">
                <span class="text-lg text-muted-foreground">¥</span>
                <input id="price" type="number" value="2800" min="1500" step="100" class="w-40 rounded-2xl border border-border bg-background px-4 py-3 text-base outline-none focus:border-primary" />
                <span class="text-sm text-muted-foreground">／ おひとり</span>
              </div>
              <p id="pricehint" class="mt-2 text-xs text-muted-foreground">手取りを守るため、参加費は<span class="text-foreground font-medium">1,500円から</span>設定できます。参加費には別途、決済手数料3.6%（約101円）がかかります。</p>
              <div class="mt-4 rounded-2xl bg-muted/60 p-4 text-sm">
                <div class="flex justify-between text-muted-foreground"><span>参加費（10名満席のとき）</span><span class="text-foreground">¥28,000</span></div>
                <div class="flex justify-between text-muted-foreground"><span>決済手数料 3.6%</span><span class="text-foreground">−¥1,008</span></div>
                <div class="flex justify-between text-muted-foreground"><span>Fleri利用料（サブスク枠内）</span><span class="text-foreground">¥0</span></div>
                <div class="mt-2 flex justify-between border-t border-border pt-2 font-medium"><span class="text-foreground">目安の手取り</span><span class="text-primary">¥26,992</span></div>
              </div>
            </div>
          </section>

          <!-- 任意設定 -->
          <section class="rounded-3xl border border-border bg-card p-6">
            <h2 class="font-heading text-lg font-bold text-foreground">キット・キャンセル（任意）</h2>
            <div class="mt-4 space-y-4">
              <div>
                <label for="ws-kit" class="text-sm font-medium text-foreground">キット申込の締め切り</label>
                <input id="ws-kit" type="date" value="2026-06-25" class="mt-1.5 w-full rounded-2xl border border-border bg-background px-4 py-3 text-base outline-none focus:border-primary" />
                <p class="mt-1.5 text-xs text-muted-foreground">材料を事前発送する場合に設定します。</p>
              </div>
              <div>
                <label for="ws-cancel" class="text-sm font-medium text-foreground">キャンセルポリシー</label>
                <select id="ws-cancel" class="mt-1.5 w-full rounded-2xl border border-border bg-background px-4 py-3 text-base outline-none focus:border-primary">
                  <option>3日前まで無料・以降50%</option>
                  <option>前日まで無料・当日100%</option>
                  <option>いつでも無料</option>
                </select>
              </div>
            </div>
          </section>

          <!-- 公開時のLINE通知 -->
          <label class="flex items-start gap-3 rounded-3xl border border-border bg-secondary/10 p-5">
            <input type="checkbox" checked class="mt-1 h-5 w-5 shrink-0 accent-[#8FA68E]" />
            <span class="text-sm leading-relaxed text-foreground/80"><span class="font-medium text-secondary-foreground">公開時に、128人のファンへLINEでお知らせする</span><br />まとめて送るので、ファンに負担をかけません。配信停止を希望した方には届きません。</span>
          </label>

          <div class="flex flex-col gap-3 sm:flex-row">
            <button type="button" onclick="window.location.href='instructor-dashboard.html'" class="flex-1 rounded-full border border-border px-6 py-4 text-base font-medium text-foreground transition-colors hover:bg-muted">下書き保存</button>
            <button type="submit" class="flex-1 rounded-full bg-primary px-6 py-4 text-base font-medium text-primary-foreground transition-transform hover:scale-[1.02]">公開する</button>
          </div>
        </form>
      </div>
    </main>

    <div id="site-footer"></div>
  </div>
  <script src="assets/fleri.js"></script>
  <script>
    // カテゴリ最大2つ
    const on = "border-primary bg-primary/10 text-primary font-medium".split(" ");
    document.querySelectorAll("#catgrid .cat").forEach((b) => b.addEventListener("click", () => {
      if (!b.classList.contains("is-on") && document.querySelectorAll("#catgrid .cat.is-on").length >= 2) return;
      b.classList.toggle("is-on");
      on.forEach((c) => b.classList.toggle(c, b.classList.contains("is-on")));
    }));
    // 参加費の最低額バリデーション
    const price = document.getElementById("price");
    const hint = document.getElementById("pricehint");
    price.addEventListener("input", () => {
      if (Number(price.value) < 1500) { hint.classList.add("text-primary"); hint.classList.remove("text-muted-foreground");
        hint.innerHTML = "参加費は1,500円以上で設定してください。"; }
      else { hint.classList.remove("text-primary"); hint.classList.add("text-muted-foreground");
        hint.innerHTML = '手取りを守るため、参加費は<span class="text-foreground font-medium">1,500円から</span>設定できます。参加費には別途、決済手数料3.6%がかかります。'; }
    });
  </script>
</body>
</html>
